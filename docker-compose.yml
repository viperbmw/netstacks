services:
  netstacks:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netstacks
    environment:
      # Database Configuration
      - DB_FILE=/data/netstacks.db
    ports:
      - "${NETSTACKS_PORT:-8088}:8088"
    restart: unless-stopped
    volumes:
      # Mount database directory for persistence
      - netstacks-data:/data

volumes:
  netstacks-data:
